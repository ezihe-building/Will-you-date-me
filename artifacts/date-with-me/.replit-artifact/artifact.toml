kind = "web"
previewPath = "/"
title = "Will You Date Me"
version = "1.0.0"
id = "artifacts/date-with-me"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20965

[services.development]
run = "pnpm --filter @workspace/date-with-me run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/date-with-me", "run", "build" ]
serve = "static"
publicDir = "artifacts/date-with-me/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20965"
BASE_PATH = "/"
